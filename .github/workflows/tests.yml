name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "cryptography>=43" numpy

      - name: Run test suite
        run: python tests/test_core.py

      - name: Run chunked-stream test suite
        run: python tests/test_stream.py

      - name: Run fail-closed demo
        run: python examples/demo.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cross-language vector verification (independent JS implementation)
        run: node tools/verify_vectors.js
